spring.application.name=indio-infrastructure
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:indiodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# App info
info.app.name=INDIO Infrastructure Manager
info.app.version=1.0.0
info.app.description=Portail de gestion de projets d'infrastructure INDIO Group
