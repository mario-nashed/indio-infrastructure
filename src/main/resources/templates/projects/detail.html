<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>INDIO Group – Détail projet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; }
        header { background: #1a1a6e; color: white; padding: 16px 32px; }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        .container { max-width: 800px; margin: 32px auto; padding: 0 24px; }
        .card { background: white; border-radius: 8px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .project-title { font-size: 1.4rem; font-weight: 700; color: #1a1a6e; margin-bottom: 8px; }
        .badge { display: inline-block; padding: 4px 14px; border-radius: 12px; font-size: 0.82rem; font-weight: 600; margin-bottom: 24px; }
        .badge-EN_COURS { background: #e6f4ea; color: #137333; }
        .badge-PLANIFIE { background: #e8f0fe; color: #1a1a6e; }
        .badge-TERMINE { background: #f1f3f4; color: #555; }
        .badge-SUSPENDU { background: #fce8e6; color: #c5221f; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .field label { font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .field p { font-size: 0.95rem; margin-top: 4px; }
        .description { margin-top: 16px; padding: 16px; background: #f8f9ff; border-radius: 6px; font-size: 0.9rem; line-height: 1.6; }
        .actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn { display: inline-block; padding: 10px 24px; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #1a1a6e; color: white; }
        .btn-secondary { background: #f0f0f0; color: #444; }
        .btn-delete { background: #fce8e6; color: #c5221f; }
    </style>
</head>
<body>
<header><h1>🏗 INDIO Group – Infrastructure Manager</h1></header>

<div class="container">
    <div class="card">
        <div class="project-title" th:text="${project.name}"></div>
        <span class="badge" th:classappend="'badge-' + ${project.status}" th:text="${project.status}"></span>

        <div class="grid">
            <div class="field">
                <label>Type</label>
                <p th:text="${project.type}"></p>
            </div>
            <div class="field">
                <label>Localisation</label>
                <p th:text="${project.location}"></p>
            </div>
            <div class="field">
                <label>Date de début</label>
                <p th:text="${project.startDate ?: '–'}"></p>
            </div>
            <div class="field">
                <label>Date de fin prévue</label>
                <p th:text="${project.endDate ?: '–'}"></p>
            </div>
            <div class="field">
                <label>Budget</label>
                <p th:text="${project.budgetMillions != null ? project.budgetMillions + ' M€' : '–'}"></p>
            </div>
        </div>

        <div class="description" th:if="${project.description}" th:text="${project.description}"></div>

        <div class="actions">
            <a th:href="@{/projects/{id}/edit(id=${project.id})}" class="btn btn-primary">Modifier</a>
            <a href="/projects" class="btn btn-secondary">Retour à la liste</a>
            <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post" style="display:inline">
                <button type="submit" class="btn btn-delete"
                        onclick="return confirm('Supprimer ce projet ?')">Supprimer</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
