<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>INDIO Group – Projet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; }
        header { background: #1a1a6e; color: white; padding: 16px 32px; }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        .container { max-width: 720px; margin: 32px auto; padding: 0 24px; }
        .card { background: white; border-radius: 8px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        h2 { font-size: 1.1rem; color: #1a1a6e; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.84rem; font-weight: 600; color: #444; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
        textarea { height: 90px; resize: vertical; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { display: inline-block; padding: 10px 24px; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #1a1a6e; color: white; }
        .btn-secondary { background: #f0f0f0; color: #444; }
        .actions { display: flex; gap: 12px; margin-top: 24px; }
        .error { color: #c5221f; font-size: 0.78rem; margin-top: 4px; }
    </style>
</head>
<body>
<header><h1>🏗 INDIO Group – Infrastructure Manager</h1></header>

<div class="container">
    <div class="card">
        <h2 th:text="${project.id == null ? 'Nouveau projet' : 'Modifier le projet'}">Projet</h2>

        <form th:action="${project.id == null ? '/projects' : '/projects/' + project.id}"
              th:object="${project}" method="post">

            <div class="form-group">
                <label>Nom du projet *</label>
                <input type="text" th:field="*{name}" placeholder="Ex: Pont de la Méditerranée"/>
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Type *</label>
                    <select th:field="*{type}">
                        <option value="">-- Sélectionner --</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                </div>
                <div class="form-group">
                    <label>Statut *</label>
                    <select th:field="*{status}">
                        <option value="">-- Sélectionner --</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Localisation *</label>
                <input type="text" th:field="*{location}" placeholder="Ex: Paris, France"/>
                <div class="error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="Description du projet..."></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Date de début</label>
                    <input type="date" th:field="*{startDate}"/>
                </div>
                <div class="form-group">
                    <label>Date de fin prévue</label>
                    <input type="date" th:field="*{endDate}"/>
                </div>
            </div>

            <div class="form-group">
                <label>Budget (millions €)</label>
                <input type="number" th:field="*{budgetMillions}" step="0.1" placeholder="Ex: 1200"/>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="/projects" class="btn btn-secondary">Annuler</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
